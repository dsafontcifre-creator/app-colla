<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>La Colla</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f2ede2;--paper:#faf7f0;--border:#d8d0c0;
  --text:#141410;--muted:#6e6860;--faint:#a8a098;
  --accent:#7fff00;--accentD:#3d8000;
  --line:#e4ddd0;--neg:#c0392b;--warn:#c07800;--warnL:#fff4e0;
  --black:#141410;
}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;}
::-webkit-scrollbar{display:none;}
input,textarea,select{outline:none;font-family:'DM Sans',sans-serif;}
input:focus,textarea:focus{border-color:var(--accentD)!important;}
textarea{resize:none;}

/* MENU */
.menu{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;}
.menu-header{background:var(--paper);border-bottom:1px solid var(--border);padding:36px 28px 28px;}
.eyebrow{font-size:9px;letter-spacing:5px;color:var(--faint);text-transform:uppercase;margin-bottom:8px;}
.logo-row{display:flex;align-items:center;gap:10px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--text);letter-spacing:3px;line-height:1;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px;}
.menu-list{flex:1;padding:0 28px;}
.menu-row{border-bottom:1px solid var(--line);padding:22px 0;display:flex;align-items:baseline;gap:16px;cursor:pointer;}
.menu-row:hover .menu-num,.menu-row:hover .menu-label,.menu-row:hover .menu-arrow{color:var(--accent)!important;}
.menu-num{font-size:11px;color:var(--faint);letter-spacing:2px;min-width:24px;transition:color .15s;}
.menu-label{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--text);letter-spacing:1px;line-height:1;flex:1;transition:color .15s;}
.menu-arrow{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--faint);transition:color .15s;}
.menu-badge{width:22px;height:22px;border-radius:50%;background:var(--accent);color:var(--black);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.menu-footer{padding:20px 28px;border-top:1px solid var(--line);font-size:10px;color:var(--faint);letter-spacing:2px;}

/* SECTION */
.section{min-height:100vh;background:var(--bg);display:none;}
.section.active{display:block;}
.sec-header{background:var(--paper);border-bottom:1px solid var(--border);padding:20px 20px 0;position:sticky;top:0;z-index:200;}
.back-btn{display:inline-flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--border);border-radius:6px;padding:10px 16px;cursor:pointer;margin-bottom:16px;color:var(--text);}
.back-arrow{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--accent);}
.back-label{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;font-weight:500;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;color:var(--text);line-height:1;margin-bottom:16px;}
.sec-body{padding:20px 16px 80px;}

/* CARDS */
.card{background:var(--paper);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:10px;transition:box-shadow .18s;}
.card:hover{box-shadow:0 3px 14px rgba(0,0,0,.07);}
.card-click{cursor:pointer;}
.card-dark{background:var(--black);border:none;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);letter-spacing:.5px;}
.card-sub{font-size:12px;color:var(--muted);margin-top:3px;}

/* LABELS */
.lbl{font-size:9px;letter-spacing:4px;color:var(--faint);text-transform:uppercase;margin-bottom:8px;display:block;}
.tag{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:600;padding:2px 8px;border-radius:3px;white-space:nowrap;display:inline-block;}

/* BUTTONS */
.btn-accent{background:var(--accent);color:var(--black);border:none;border-radius:5px;padding:10px 20px;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;}
.btn-ghost{background:none;border:1px solid var(--border);border-radius:5px;padding:8px 14px;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);}
.btn-ghost:hover{border-color:var(--accentD);color:var(--accentD);}
.btn-dashed{width:100%;background:none;border:1px dashed var(--border);border-radius:6px;padding:13px;color:var(--muted);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:10px;}

/* FAB */
.fab{position:fixed;bottom:28px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:var(--black);border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(127,255,0,.4);font-weight:700;z-index:100;transition:transform .15s;}
.fab:hover{transform:scale(1.06);}
.fab:active{transform:scale(.94);}

/* INPUTS */
.inp-wrap{margin-bottom:14px;}
.inp-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block;}
.inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:10px 12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;}
textarea.inp{height:100px;}

/* PILLS */
.pill-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;}
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;user-select:none;}
.pill.on{background:var(--accent);color:var(--black);border-color:var(--accent);}
.pill:hover{opacity:.82;}

/* AVATAR */
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-family:'DM Sans',sans-serif;}
.av-sm{width:22px;height:22px;font-size:8px;background:var(--accent);color:var(--black);border:2px solid var(--accent);}
.av-md{width:28px;height:28px;font-size:10px;}
.av-lg{width:36px;height:36px;font-size:13px;}
.av-on{background:var(--accent);color:var(--black);border:2px solid var(--accent);}
.av-off{background:var(--line);color:var(--muted);border:1px solid var(--border);}

/* DIVIDER */
.divider{height:1px;background:var(--line);margin:12px 0;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(20,20,16,.55);display:flex;align-items:flex-end;z-index:300;display:none;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--paper);border-radius:14px 14px 0 0;padding:24px;width:100%;max-height:90vh;overflow-y:auto;border-top:4px solid var(--accent);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--text);margin-bottom:20px;letter-spacing:1px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;}

/* PROGRESS BAR */
.progress-wrap{height:5px;background:var(--line);border-radius:3px;margin-bottom:4px;overflow:hidden;}
.progress-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .4s;}

/* POLL */
.poll-opt{border-radius:6px;border:1px solid var(--border);overflow:hidden;cursor:pointer;margin-bottom:8px;position:relative;}
.poll-opt.voted{border-color:var(--accent);background:rgba(127,255,0,.07);}
.poll-opt-inner{padding:10px 12px;position:relative;}
.poll-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(127,255,0,.15);border-radius:6px;transition:width .4s;}
.poll-content{position:relative;display:flex;justify-content:space-between;align-items:center;}
.poll-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;}
.poll-check.checked{background:var(--accent);border-color:var(--accent);}

/* TURNOS */
.turn-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);}
.turn-row:last-child{border-bottom:none;}
.turn-avs{display:flex;}
.turn-avs .av:not(:first-child){margin-left:-8px;}

/* SHOPPING */
.shop-item{display:flex;align-items:center;gap:12px;background:var(--paper);border:1px solid var(--border);border-radius:6px;padding:13px 16px;margin-bottom:8px;}
.shop-check{width:22px;height:22px;border-radius:4px;border:2px solid var(--border);background:none;cursor:pointer;flex-shrink:0;}
.shop-check.done{background:var(--accent);border-color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--black);font-weight:700;}
.shop-del{background:none;border:none;color:var(--faint);font-size:20px;cursor:pointer;line-height:1;}

/* CUOTAS */
.quota-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);}
.quota-row:last-child{border-bottom:none;}

/* EVENT DETAIL */
.ev-type-tag{display:inline-block;margin-bottom:6px;}
.ev-big-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;color:var(--text);line-height:1;margin-bottom:4px;}
.ev-date{font-size:12px;color:var(--muted);margin-bottom:14px;text-transform:capitalize;}

/* ATTEND PILLS */
.attend-grid{display:flex;flex-wrap:wrap;gap:5px;}

/* COLLA */
.group-card{background:var(--paper);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
.group-avs{display:flex;}
.group-avs .av:not(:first-child){margin-left:-8px;}
.group-name{font-size:15px;color:var(--text);font-weight:500;}

/* WARN CARD */
.warn-card{background:var(--warnL);border:1px solid rgba(192,120,0,.33);border-radius:6px;padding:16px;margin-bottom:10px;}
</style>
</head>
<body>

<!-- ═══════════════════════════════ MENU ═══════════════════════════════ -->
<div class="menu" id="mainMenu">
  <div class="menu-header">
    <div class="eyebrow">Castellón de la Plana</div>
    <div class="logo-row">
      <div class="logo">LA COLLA</div>
      <div class="dot"></div>
    </div>
  </div>
  <div class="menu-list" id="menuList"></div>
  <div class="menu-footer" id="menuFooter"></div>
</div>

<!-- ═══════════════════════════════ SECTIONS ═══════════════════════════ -->
<div class="section" id="sec-eventos">
  <div class="sec-header">
    <button class="back-btn" onclick="goMenu()"><span class="back-arrow">←</span><span class="back-label">Menú</span></button>
    <div class="sec-title">Eventos</div>
  </div>
  <div class="sec-body" id="body-eventos"></div>
  <button class="fab" onclick="openModal('modalEvento')">+</button>
</div>

<div class="section" id="sec-caja">
  <div class="sec-header">
    <button class="back-btn" onclick="goMenu()"><span class="back-arrow">←</span><span class="back-label">Menú</span></button>
    <div class="sec-title">Caja</div>
  </div>
  <div class="sec-body" id="body-caja"></div>
</div>

<div class="section" id="sec-compra">
  <div class="sec-header">
    <button class="back-btn" onclick="goMenu()"><span class="back-arrow">←</span><span class="back-label">Menú</span></button>
    <div class="sec-title">Compra</div>
  </div>
  <div class="sec-body" id="body-compra"></div>
  <button class="fab" onclick="openModal('modalShop')">+</button>
</div>

<div class="section" id="sec-turnos">
  <div class="sec-header">
    <button class="back-btn" onclick="goMenu()"><span class="back-arrow">←</span><span class="back-label">Menú</span></button>
    <div class="sec-title">Turnos</div>
  </div>
  <div class="sec-body" id="body-turnos"></div>
</div>

<div class="section" id="sec-cuotas">
  <div class="sec-header">
    <button class="back-btn" onclick="goMenu()"><span class="back-arrow">←</span><span class="back-label">Menú</span></button>
    <div class="sec-title">Cuotas</div>
  </div>
  <div class="sec-body" id="body-cuotas"></div>
</div>

<div class="section" id="sec-colla">
  <div class="sec-header">
    <button class="back-btn" onclick="goMenu()"><span class="back-arrow">←</span><span class="back-label">Menú</span></button>
    <div class="sec-title">Colla</div>
  </div>
  <div class="sec-body" id="body-colla"></div>
</div>

<!-- EVENT DETAIL -->
<div class="section" id="sec-evdetail">
  <div class="sec-header">
    <button class="back-btn" onclick="goSection('eventos')"><span class="back-arrow">←</span><span class="back-label">Eventos</span></button>
    <div id="evdetail-header"></div>
  </div>
  <div class="sec-body" id="body-evdetail"></div>
</div>

<!-- ═══════════════════════════════ MODALS ════════════════════════════ -->
<div class="modal-overlay" id="modalEvento" onclick="closeModalBg(event,'modalEvento')">
  <div class="modal-box">
    <div class="modal-title">Nuevo Evento</div>
    <div class="inp-wrap">
      <label class="inp-label">Tipo</label>
      <div class="pill-row" id="evTypePills"></div>
    </div>
    <div class="inp-wrap"><label class="inp-label">Título</label><input class="inp" id="evTitle" placeholder="Ej: Paella valenciana"/></div>
    <div class="inp-wrap"><label class="inp-label">Fecha</label><input class="inp" type="date" id="evDate"/></div>
    <div class="inp-wrap"><label class="inp-label">Hora</label><input class="inp" type="time" id="evTime"/></div>
    <div class="inp-wrap"><label class="inp-label">Descripción</label><input class="inp" id="evDesc" placeholder="Detalles..."/></div>
    <div id="evAgendaWrap" style="display:none" class="inp-wrap"><label class="inp-label">Orden del día</label><textarea class="inp" id="evAgenda" placeholder="1. Punto uno&#10;2. Punto dos"></textarea></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modalEvento')">Cancelar</button>
      <button class="btn-accent" onclick="addEvento()">Crear</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalCompra" onclick="closeModalBg(event,'modalCompra')">
  <div class="modal-box">
    <div class="modal-title">Registrar Compra</div>
    <div class="inp-wrap"><label class="inp-label">Qué se compró</label><input class="inp" id="compraWhat" placeholder="Ej: Papel higiénico"/></div>
    <div class="inp-wrap"><label class="inp-label">Importe (€)</label><input class="inp" type="number" id="compraAmt" placeholder="0.00"/></div>
    <div class="inp-wrap"><label class="inp-label">Quién pagó</label><div class="pill-row" id="compraWhoPills"></div></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modalCompra')">Cancelar</button>
      <button class="btn-accent" onclick="addCompra()">Añadir</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalShop" onclick="closeModalBg(event,'modalShop')">
  <div class="modal-box">
    <div class="modal-title">Añadir Necesidad</div>
    <div class="inp-wrap"><label class="inp-label">Qué hace falta</label><input class="inp" id="shopText" placeholder="Ej: Lejía, bombilla..."/></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modalShop')">Cancelar</button>
      <button class="btn-accent" onclick="addShopItem()">Añadir</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalPoll" onclick="closeModalBg(event,'modalPoll')">
  <div class="modal-box">
    <div class="modal-title">Nueva Votación</div>
    <div class="inp-wrap"><label class="inp-label">Pregunta</label><input class="inp" id="pollTitle" placeholder="Ej: ¿Qué día preferís?"/></div>
    <div class="inp-wrap">
      <label class="inp-label">Tipo</label>
      <div class="pill-row">
        <span class="pill on" id="pollTypeSingle" onclick="setPollType(false)">Una opción</span>
        <span class="pill" id="pollTypeMulti" onclick="setPollType(true)">Varias opciones</span>
      </div>
    </div>
    <div id="pollOptsWrap"></div>
    <button class="btn-ghost" onclick="addPollOpt()" style="width:100%;margin-bottom:14px;">+ Añadir opción</button>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modalPoll')">Cancelar</button>
      <button class="btn-accent" onclick="savePoll()">Crear</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalEvExp" onclick="closeModalBg(event,'modalEvExp')">
  <div class="modal-box">
    <div class="modal-title">Gasto del Evento</div>
    <div class="inp-wrap"><label class="inp-label">Qué se compró</label><input class="inp" id="evExpWhat" placeholder="Ej: Arroz y verduras"/></div>
    <div class="inp-wrap"><label class="inp-label">Importe (€)</label><input class="inp" type="number" id="evExpAmt" placeholder="0.00"/></div>
    <div class="inp-wrap"><label class="inp-label">Quién pagó</label><div class="pill-row" id="evExpWhoPills"></div></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modalEvExp')">Cancelar</button>
      <button class="btn-accent" onclick="addEvExp()">Añadir</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalTurnNote" onclick="closeModalBg(event,'modalTurnNote')">
  <div class="modal-box">
    <div class="modal-title">Nota del turno</div>
    <div class="inp-wrap"><label class="inp-label">Observación</label><textarea class="inp" id="turnNoteText" placeholder="Ej: Falta lejía. No hemos podido fregar la terraza."></textarea></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modalTurnNote')">Cancelar</button>
      <button class="btn-accent" onclick="saveTurnNote()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════ DATA ════════════════════════════════

const GROUPS = [
  {id:1,members:["David","Carmen"]},

const MEMBERS = GROUPS.flatMap((g,gi)=>g.members.map((name,ni)=>({id:gi*2+ni+1,name,groupId:g.id})));

const EVENT_TYPES = {
  comida:{label:"Comida",color:"#3d8000"},
  cena:{label:"Cena",color:"#5a6ea8"},

  {id:3,title:"Reunión de colla",type:"reunion",date:"2026-05-28",time:"20:30",description:"Reunión ordinaria mayo.",attendees:[1,2,3,4,5,6,7,8],expenses:[],agenda:"1. Cuotas pendientes\n2. Organización fiesta julio\n3. Reparación baño\n4. Ruegos y preguntas",polls:[]},
];

let compras = [
  {id:1,who:"Inma",what:"Lejía y bayetas",amount:8.4,date:"2026-05-10",reintegrated:true,confirmedBy:"Edu"},
  {id:2,who:"David",what:"Papel de cocina x4",amount:6.8,date:"2026-05-14",reintegrated:false,confirmedBy:null},
  {id:3,who:"Carla",what:"Detergente loza",amount:4.95,date:"2026-05-16",reintegrated:false,confirmedBy:null},
];

let turns = [
  {week:"19 may",group:1,note:"",done:false},
  {week:"26 may",group:3,note:"Falta lejía en el baño pequeño.",done:true},
  {week:"2 jun",group:5,note:"",done:false},
  {week:"9 jun",group:7,note:"",done:false},
  {week:"16 jun",group:9,note:"",done:false},
  {week:"23 jun",group:2,note:"",done:false},
];

let quotas = [
  {id:1,concept:"Cuota mensual",amount:20,month:"Mayo 2026",payments:MEMBERS.map(m=>({name:m.name,selfDeclared:true,confirmedByTreasurer:m.id<16}))},
  {id:2,concept:"Cuota mensual",amount:20,month:"Junio 2026",payments:MEMBERS.map(m=>({name:m.name,selfDeclared:[1,2,5,9].includes(m.id),confirmedByTreasurer:[1,2].includes(m.id)}))},
];

let shopping = [
  {id:1,text:"Papel higiénico",done:false,addedBy:"Inma"},
  {id:2,text:"Bombilla terraza",done:false,addedBy:"Carmen"},
  {id:3,text:"Lejía",done:true,addedBy:"David"},
];

let activeEvId = null;
let pollMulti = false;
let pollOpts = ["","",""];
let editTurnIdx = null;
let compraWho = ME;
let evExpWho = ME;
let evType = "comida";

// ═══════════════════════════════ HELPERS ══════════════════════════════
const ini = n => n ? n[0].toUpperCase() : "?";
const gm = id => MEMBERS.find(m=>m.id===id);
const gg = id => GROUPS.find(g=>g.id===id);
const fmtD = s => {
  const d = new Date(s+"T12:00:00");
  return {
    day: d.getDate(),
    mon: d.toLocaleDateString("es-ES",{month:"short"}),
    wday: d.toLocaleDateString("es-ES",{weekday:"long"}),
  };
};
const av = (name,cls="av-md av-off") => `<span class="av ${cls}">${ini(name)}</span>`;
const tag = (text,color,bg) => `<span class="tag" style="color:${color};background:${bg||color+'18'}">${text}</span>`;

// ═══════════════════════════════ NAVIGATION ═══════════════════════════
function goMenu(){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('mainMenu').style.display='flex';
  renderMenu();
}

function goSection(key){
  document.getElementById('mainMenu').style.display='none';
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  const s = document.getElementById('sec-'+key);
  if(s) s.classList.add('active');
  renderSection(key);
}

function renderSection(key){
  if(key==='eventos') renderEventos();
  if(key==='caja') renderCaja();
  if(key==='compra') renderCompra();
  if(key==='turnos') renderTurnos();
  if(key==='cuotas') renderCuotas();
  if(key==='colla') renderColla();
}

// ═══════════════════════════════ MENU ═════════════════════════════════
const MENU_ITEMS = [
  {key:"eventos",label:"Eventos",num:"01"},
  {key:"caja",label:"Caja",num:"02"},
  {key:"compra",label:"Compra",num:"03"},
  {key:"turnos",label:"Turnos",num:"04"},
  {key:"cuotas",label:"Cuotas",num:"05"},
  {key:"colla",label:"Colla",num:"06"},
];

function getBadge(key){
  if(key==='eventos') return events.reduce((s,e)=>s+(e.polls||[]).filter(p=>p.open).length,0)||null;
  if(key==='caja') return compras.filter(c=>!c.reintegrated).length||null;
  if(key==='compra') return shopping.filter(s=>!s.done).length||null;
  if(key==='cuotas') return quotas.reduce((s,q)=>s+(q.payments||[]).filter(p=>!p.confirmedByTreasurer&&p.selfDeclared).length,0)||null;
  return null;
}

function renderMenu(){
  const list = document.getElementById('menuList');
  list.innerHTML = MENU_ITEMS.map(item=>{
    const b = getBadge(item.key);
    return `<div class="menu-row" onclick="goSection('${item.key}')">
      <span class="menu-num">${item.num}</span>
      <span class="menu-label">${item.label}</span>
      ${b ? `<span class="menu-badge">${b}</span>` : ''}
      <span class="menu-arrow">›</span>
    </div>`;
  }).join('');
  document.getElementById('menuFooter').textContent = `${MEMBERS.length} miembros · Tesorero: ${TREASURER}`;
}

// ═══════════════════════════════ EVENTOS ═════════════════════════════
function renderEventos(){
  const sorted = [...events].sort((a,b)=>a.date>b.date?1:-1);
  document.getElementById('body-eventos').innerHTML = `
    <span class="lbl">Próximos eventos</span>
    ${sorted.map(ev=>{
      const {day,mon} = fmtD(ev.date);
      const total = (ev.expenses||[]).reduce((s,x)=>s+x.amount,0);
      const et = EVENT_TYPES[ev.type]||EVENT_TYPES.otro;
      const openP = (ev.polls||[]).filter(p=>p.open).length;
      const atavs = ev.attendees.slice(0,9).map(id=>av(gm(id)?.name,'av av-sm av-on')).join('');
      return `<div class="card card-click" onclick="openEvDetail(${ev.id})">
        <div style="display:flex;gap:14px;align-items:flex-start">
          <div style="text-align:center;min-width:42px;flex-shrink:0">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;color:var(--text)">${day}</div>
            <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--faint)">${mon}</div>
          </div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:5px;flex-wrap:wrap">
              <div class="card-title">${ev.title}</div>
              ${tag(et.label,et.color)}
            </div>
            ${ev.description ? `<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px">${ev.description}</div>` : ''}
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              ${tag(ev.attendees.length+' apuntados','#6e6860')}
              ${total>0 ? tag(total.toFixed(2)+' €','#3d8000') : ''}
              ${openP>0 ? tag(openP+' votación'+(openP>1?'es':''),'#5a6ea8') : ''}
              ${ev.type==='reunion'&&ev.agenda ? tag('Orden del día','#c07800') : ''}
            </div>
            ${ev.attendees.length>0 ? `<div style="margin-top:8px;display:flex;gap:3px;flex-wrap:wrap">${atavs}${ev.attendees.length>9?`<span style="font-size:11px;color:var(--faint);align-self:center">+${ev.attendees.length-9}</span>`:''}</div>` : ''}
          </div>
          <span style="color:var(--faint);font-size:20px;align-self:center">›</span>
        </div>
      </div>`;
    }).join('')}
  `;
}

function openEvDetail(evId){
  activeEvId = evId;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-evdetail').classList.add('active');
  renderEvDetail();
}

function renderEvDetail(){
  const ev = events.find(e=>e.id===activeEvId);
  if(!ev) return;
  const {day,mon,wday} = fmtD(ev.date);
  const et = EVENT_TYPES[ev.type]||EVENT_TYPES.otro;
  const isReu = ev.type==='reunion';
  const total = (ev.expenses||[]).reduce((s,x)=>s+x.amount,0);
  const perHead = ev.attendees.length>0&&total>0 ? (total/ev.attendees.length).toFixed(2) : null;

  document.getElementById('evdetail-header').innerHTML = `
    <div>${tag(et.label,et.color)}</div>
    <div class="ev-big-title">${ev.title}</div>
    <div class="ev-date">${wday} ${day} ${mon} · ${ev.time}</div>
  `;

  let html = '';
  if(ev.description) html += `<div style="font-size:13px;color:var(--muted);font-style:italic;margin-bottom:18px">${ev.description}</div>`;

  if(isReu && ev.agenda){
    html += `<span class="lbl">Orden del día</span>
    <div class="warn-card"><div style="font-size:13px;color:var(--text);white-space:pre-line;line-height:1.7">${ev.agenda}</div></div>`;
  }

  // Polls
  if((ev.polls||[]).length>0){
    html += `<span class="lbl" style="margin-top:16px">Votaciones</span>`;
    ev.polls.forEach(p=>{ html += renderPollHTML(p, ev.id); });
  }
  html += `<button class="btn-dashed" onclick="openPollModal()">+ Nueva votación</button>`;

  // Attendees
  html += `<span class="lbl" style="margin-top:8px">Apuntados (${ev.attendees.length})</span>
  <div class="card"><div class="attend-grid">
    ${MEMBERS.map(m=>{
      const on = ev.attendees.includes(m.id);
      return `<span class="pill${on?' on':''}" onclick="toggleAtt(${ev.id},${m.id})">
        ${av(m.name, 'av '+(on?'av-on':'av-off'))} ${m.name}
      </span>`;
    }).join('')}
  </div></div>`;

  // Expenses
  if(!isReu){
    html += `<span class="lbl" style="margin-top:18px">Gastos del evento</span>`;
    if((ev.expenses||[]).length===0) html += `<div style="font-size:13px;color:var(--faint);font-style:italic;margin-bottom:10px">Sin gastos registrados.</div>`;
    (ev.expenses||[]).forEach(x=>{
      html += `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:14px;color:var(--text);margin-bottom:3px">${x.what}</div><div style="font-size:12px;color:var(--muted)">Pagó ${x.who}</div></div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text)">${x.amount.toFixed(2)} €</div>
      </div></div>`;
    });
    html += `<button class="btn-dashed" onclick="openModal('modalEvExp');initEvExpPills()">+ Añadir gasto</button>`;
    if(perHead){
      html += `<div class="card card-dark" style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:9px;letter-spacing:3px;color:var(--faint);text-transform:uppercase;margin-bottom:4px">Total evento</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:#fff">${total.toFixed(2)} €</div></div>
        <div style="text-align:right"><div style="font-size:9px;letter-spacing:3px;color:var(--faint);text-transform:uppercase;margin-bottom:4px">Por persona</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent)">${perHead} €</div></div>
      </div>
      <div style="font-size:11px;color:var(--faint);margin-top:4px">Entre ${ev.attendees.length} asistentes</div>`;
    }
  }

  document.getElementById('body-evdetail').innerHTML = html;
}

function renderPollHTML(p, evId){
  const totalV = [...new Set(p.options.flatMap(o=>o.votes))].length;
  const myVotes = p.options.filter(o=>o.votes.includes(ME)).map(o=>o.id);
  const maxV = Math.max(...p.options.map(o=>o.votes.length),1);
  let html = `<div class="card" style="border-left:4px solid var(--accent)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);letter-spacing:.5px;margin-bottom:6px">${p.title}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${tag(p.multi?'Varias opciones':'Una opción','#a8a098')}
          ${tag(totalV+' votos','#a8a098')}
          ${!p.open?tag('Cerrada','#c0392b'):''}
        </div>
      </div>
      ${p.open?`<button class="btn-ghost" style="font-size:9px;padding:4px 10px" onclick="closePoll(${evId},${p.id})">Cerrar</button>`:''}
    </div>`;
  p.options.forEach(opt=>{
    const voted = myVotes.includes(opt.id);
    const pct = Math.round((opt.votes.length/maxV)*100);
    const winner = !p.open && opt.votes.length===maxV && opt.votes.length>0;
    html += `<div class="poll-opt${voted?' voted':''}" onclick="${p.open?`castVote(${evId},${p.id},${opt.id},${p.multi})`:''}">
      <div class="poll-opt-inner">
        <div class="poll-fill" style="width:${pct}%"></div>
        <div class="poll-content">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="poll-check${voted?' checked':(p.multi?'':'')}">
              ${voted?'✓':''}
            </div>
            <span style="font-size:13px;color:var(--text)">${opt.text}</span>
            ${winner?tag('Ganadora','#3d8000'):''}
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:12px;color:var(--muted)">${opt.votes.length}</span>
            ${opt.votes.slice(0,4).map(v=>av(v,'av av-sm '+(v===ME?'av-on':'av-off'))).join('')}
          </div>
        </div>
      </div>
    </div>`;
  });
  if(p.open) html += `<div style="font-size:11px;color:var(--faint);margin-top:10px;font-style:italic">${p.multi?'Puedes seleccionar varias opciones':'Selecciona una opción'} · Toca para votar</div>`;
  html += `</div>`;
  return html;
}

function toggleAtt(evId,mid){
  const ev = events.find(e=>e.id===evId);
  if(!ev) return;
  const idx = ev.attendees.indexOf(mid);
  if(idx>-1) ev.attendees.splice(idx,1); else ev.attendees.push(mid);
  renderEvDetail();
}

function castVote(evId,pollId,optId,multi){
  const ev = events.find(e=>e.id===evId);
  if(!ev) return;
  const p = ev.polls.find(x=>x.id===pollId);
  if(!p||!p.open) return;
  p.options.forEach(o=>{
    if(multi){
      if(o.id===optId){
        const i=o.votes.indexOf(ME);
        if(i>-1) o.votes.splice(i,1); else o.votes.push(ME);
      }
    } else {
      if(o.id===optId){
        const i=o.votes.indexOf(ME);
        if(i>-1) o.votes.splice(i,1); else o.votes.push(ME);
      } else {
        const i=o.votes.indexOf(ME);
        if(i>-1) o.votes.splice(i,1);
      }
    }
  });
  renderEvDetail();
}

function closePoll(evId,pollId){
  const ev = events.find(e=>e.id===evId);
  if(!ev) return;
  const p = ev.polls.find(x=>x.id===pollId);
  if(p) p.open=false;
  renderEvDetail();
}

function addEvento(){
  const title = document.getElementById('evTitle').value.trim();
  const date = document.getElementById('evDate').value;
  if(!title||!date) return;
  events.push({
    id: Date.now(),
    title, type: evType,
    date, time: document.getElementById('evTime').value,
    description: document.getElementById('evDesc').value,
    agenda: document.getElementById('evAgenda').value,
    attendees:[], expenses:[], polls:[],
  });
  closeModal('modalEvento');
  document.getElementById('evTitle').value='';
  document.getElementById('evDate').value='';
  document.getElementById('evTime').value='';
  document.getElementById('evDesc').value='';
  document.getElementById('evAgenda').value='';
  renderEventos();
}

function addEvExp(){
  const ev = events.find(e=>e.id===activeEvId);
  if(!ev) return;
  const what = document.getElementById('evExpWhat').value.trim();
  const amt = parseFloat(document.getElementById('evExpAmt').value);
  if(!what||!amt) return;
  ev.expenses.push({id:Date.now(),who:evExpWho,what,amount:amt});
  closeModal('modalEvExp');
  document.getElementById('evExpWhat').value='';
  document.getElementById('evExpAmt').value='';
  renderEvDetail();
}

// Poll modal
function openPollModal(){
  pollOpts = ["","",""];
  pollMulti = false;
  renderPollOpts();
  document.getElementById('pollTitle').value='';
  document.getElementById('pollTypeSingle').className='pill on';
  document.getElementById('pollTypeMulti').className='pill';
  openModal('modalPoll');
}
function setPollType(multi){
  pollMulti = multi;
  document.getElementById('pollTypeSingle').className='pill'+(multi?'':' on');
  document.getElementById('pollTypeMulti').className='pill'+(multi?' on':'');
}
function renderPollOpts(){
  document.getElementById('pollOptsWrap').innerHTML = pollOpts.map((o,i)=>
    `<div class="inp-wrap"><label class="inp-label">Opción ${i+1}</label><input class="inp" value="${o}" oninput="pollOpts[${i}]=this.value" placeholder="Opción ${i+1}"/></div>`
  ).join('');
}
function addPollOpt(){ pollOpts.push(""); renderPollOpts(); }
function savePoll(){
  const ev = events.find(e=>e.id===activeEvId);
  if(!ev) return;
  const title = document.getElementById('pollTitle').value.trim();
  if(!title) return;
  const opts = pollOpts.filter(o=>o.trim()).map((text,i)=>({id:i+1,text,votes:[]}));
  if(opts.length<2) return;
  ev.polls.push({id:Date.now(),title,multi:pollMulti,open:true,options:opts});
  closeModal('modalPoll');
  renderEvDetail();
}

// ═══════════════════════════════ CAJA ════════════════════════════════
function renderCaja(){
  const total = compras.reduce((s,c)=>s+c.amount,0);
  const pend = compras.filter(c=>!c.reintegrated);
  let html = `<div class="card card-dark" style="margin-bottom:20px">
    <div style="font-size:9px;letter-spacing:4px;color:var(--faint);text-transform:uppercase;margin-bottom:4px">Compras este mes</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--accent);letter-spacing:2px;line-height:1">${total.toFixed(2)} €</div>
    <div style="font-size:11px;color:var(--faint);margin-top:6px">${pend.length} pendiente${pend.length!==1?'s':''} de reintegro</div>
  </div>`;
  if(pend.length>0) html += `<div style="font-size:12px;color:var(--warn);background:var(--warnL);border:1px solid rgba(192,120,0,.33);border-radius:6px;padding:8px 12px;margin-bottom:10px">${pend.length} compra${pend.length>1?'s':''} pendiente${pend.length>1?'s':''} de reintegro</div>`;
  html += `<span class="lbl">Compras puntuales</span>`;
  compras.forEach(c=>{
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div style="flex:1;padding-right:10px">
          <div style="font-size:14px;color:var(--text);margin-bottom:3px">${c.what}</div>
          <div style="font-size:12px;color:var(--muted)">Pagó ${c.who} · ${c.date}</div>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text)">${c.amount.toFixed(2)} €</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        ${c.reintegrated
          ? tag('Reintegrado','#3d8000')
          : `${tag('Pendiente reintegro','#c07800')} <button class="btn-ghost" style="font-size:9px;padding:4px 10px" onclick="doReintegrate(${c.id})">Marcar reintegrado</button>`
        }
        ${c.confirmedBy
          ? tag('Confirmado · '+c.confirmedBy,'#3d8000')
          : ME===TREASURER ? `<button class="btn-ghost" style="font-size:9px;padding:4px 10px" onclick="doConfirmComp(${c.id})">✓ Confirmar</button>` : ''
        }
      </div>
    </div>`;
  });
  html += `<button class="btn-dashed" onclick="initCompraPills();openModal('modalCompra')">+ Registrar compra</button>`;
  document.getElementById('body-caja').innerHTML = html;
}

function doReintegrate(id){ const c=compras.find(x=>x.id===id); if(c) c.reintegrated=true; renderCaja(); }
function doConfirmComp(id){ const c=compras.find(x=>x.id===id); if(c) c.confirmedBy=TREASURER; renderCaja(); }

function addCompra(){
  const what = document.getElementById('compraWhat').value.trim();
  const amt = parseFloat(document.getElementById('compraAmt').value);
  if(!what||!amt) return;
  compras.unshift({id:Date.now(),who:compraWho,what,amount:amt,date:new Date().toISOString().split("T")[0],reintegrated:false,confirmedBy:null});
  closeModal('modalCompra');
  document.getElementById('compraWhat').value='';
  document.getElementById('compraAmt').value='';
  renderCaja();
}

function initCompraPills(){
  compraWho = ME;
  document.getElementById('compraWhoPills').innerHTML = MEMBERS.map(m=>
    `<span class="pill${m.name===compraWho?' on':''}" onclick="setCompraWho('${m.name}',this)">${av(m.name,'av '+(m.name===compraWho?'av-on':'av-off'))} ${m.name}</span>`
  ).join('');

function setCompraWho(name,el){
  compraWho=name;
  document.querySelectorAll('#compraWhoPills .pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
}

function initEvExpPills(){
  evExpWho = ME;
  document.getElementById('evExpWhoPills').innerHTML = MEMBERS.map(m=>
    `<span class="pill${m.name===evExpWho?' on':''}" onclick="setEvExpWho('${m.name}',this)">${av(m.name,'av '+(m.name===evExpWho?'av-on':'av-off'))} ${m.name}</span>`
  ).join('');
}
function setEvExpWho(name,el){
  evExpWho=name;
  document.querySelectorAll('#evExpWhoPills .pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
}

// ═══════════════════════════════ COMPRA ══════════════════════════════
function renderCompra(){
  const pending = shopping.filter(s=>!s.done);
  const done = shopping.filter(s=>s.done);
  let html = `<span class="lbl">Necesidades del local (${pending.length} pendientes)</span>`;
  if(pending.length===0) html += `<div style="font-size:13px;color:var(--faint);font-style:italic;margin-bottom:10px">Todo en orden.</div>`;
  pending.forEach(item=>{
    html += `<div class="shop-item">
      <button class="shop-check" onclick="toggleShop(${item.id})"></button>
      <div style="flex:1"><div style="font-size:14px;color:var(--text)">${item.text}</div><div style="font-size:11px;color:var(--faint);margin-top:2px">Añadido por ${item.addedBy}</div></div>
      <button class="shop-del" onclick="removeShop(${item.id})">×</button>
    </div>`;
  });
  if(done.length>0){
    html += `<span class="lbl" style="margin-top:20px">Comprado</span>`;
    done.forEach(item=>{
      html += `<div class="shop-item" style="opacity:.55;border-color:var(--line)">
        <button class="shop-check done" onclick="toggleShop(${item.id})">✓</button>
        <div style="flex:1;text-decoration:line-through;color:var(--muted);font-size:14px">${item.text}</div>
        <button class="shop-del" onclick="removeShop(${item.id})">×</button>
      </div>`;
    });
  }
  document.getElementById('body-compra').innerHTML = html;
}

function toggleShop(id){ const s=shopping.find(x=>x.id===id); if(s) s.done=!s.done; renderCompra(); }
function removeShop(id){ shopping=shopping.filter(s=>s.id!==id); renderCompra(); }
function addShopItem(){
  const text=document.getElementById('shopText').value.trim();
  if(!text) return;
  shopping.push({id:Date.now(),text,done:false,addedBy:ME});
  closeModal('modalShop');
  document.getElementById('shopText').value='';
  renderCompra();
}

// ═══════════════════════════════ TURNOS ══════════════════════════════
function renderTurnos(){
  let html = `<span class="lbl">Limpieza y compra · por grupo</span>`;
  turns.forEach((t,i)=>{
    const group = gg(t.group);
    const now = i===0;
    const avs = (group?.members||[]).map((n,ni)=>`<span style="margin-left:${ni>0?'-8px':'0'};z-index:${ni};position:relative">${av(n,'av av-md '+(now?'av-on':'av-off'))}</span>`).join('');
    html += `<div class="card" style="border-left:4px solid ${now?'var(--accent)':'var(--border)'}">
      <div style="display:flex;justify-content:space-between;align-items:center;${t.note?'margin-bottom:12px':''}">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="turn-avs">${avs}</div>
          <div>
            <div style="font-size:14px;font-weight:${now?600:400};color:${now?'var(--text)':'var(--muted)'}">${(group?.members||[]).join(" & ")}</div>
            <div style="display:flex;gap:6px;margin-top:3px;flex-wrap:wrap">
              ${now?tag('Esta semana','#3d8000'):''}
              ${t.done?tag('Completado','#3d8000'):''}
            </div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--faint);margin-bottom:6px">${t.week}</div>
          ${now&&!t.done?`<button class="btn-ghost" style="font-size:9px;padding:4px 10px" onclick="openTurnNote(${i})">+ Nota</button>`:''}
        </div>
      </div>
      ${t.note?`<div style="font-size:13px;color:var(--muted);background:var(--bg);border-radius:5px;padding:10px 12px;line-height:1.5;font-style:italic">${t.note}</div>`:''}
    </div>`;
  });
  document.getElementById('body-turnos').innerHTML = html;
}

function openTurnNote(idx){
  editTurnIdx = idx;
  document.getElementById('turnNoteText').value = turns[idx].note||'';
  openModal('modalTurnNote');
}
function saveTurnNote(){
  if(editTurnIdx===null) return;
  turns[editTurnIdx].note = document.getElementById('turnNoteText').value;
  turns[editTurnIdx].done = true;
  closeModal('modalTurnNote');
  editTurnIdx = null;
  renderTurnos();
}

// ═══════════════════════════════ CUOTAS ══════════════════════════════
function renderCuotas(){
  let html = '';
  if(ME===TREASURER) html += `<div style="font-size:12px;color:var(--accentD);background:rgba(127,255,0,.13);border:1px solid rgba(127,255,0,.33);border-radius:6px;padding:8px 12px;margin-bottom:16px">Modo tesorero activo · Puedes confirmar pagos</div>`;
  quotas.forEach(q=>{
    const confirmed = q.payments.filter(p=>p.confirmedByTreasurer).length;
    const declared = q.payments.filter(p=>p.selfDeclared).length;
    const pct = Math.round((confirmed/MEMBERS.length)*100);
    html += `<div style="margin-bottom:24px">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px">
        <div><span class="lbl">${q.month}</span><div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text)">${q.concept} · ${q.amount} €</div></div>
        ${tag(confirmed+'/'+MEMBERS.length,pct===100?'#3d8000':'#c07800')}
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div style="font-size:10px;color:var(--faint);margin-bottom:12px;letter-spacing:1px">${declared} declarados · ${confirmed} confirmados</div>
      <div class="card" style="padding:0 16px">
        ${q.payments.map((p,i)=>{
          const isMe = p.name===ME;
          const isTr = ME===TREASURER;
          let actions = '';
          if(p.confirmedByTreasurer) actions = tag('Confirmado','#3d8000');
          else if(p.selfDeclared) actions = `${tag('Declarado','#c07800')} ${isTr?`<button class="btn-ghost" style="font-size:9px;padding:3px 8px" onclick="doConfirmPay(${q.id},'${p.name}')">✓</button>`:''}`;
          else if(isMe) actions = `<button class="btn-accent" style="font-size:9px;padding:5px 12px" onclick="doDeclarePaid(${q.id},'${p.name}')">He pagado</button>`;
          else actions = tag('Pendiente','#c0392b');
          return `<div class="quota-row">
            <div style="display:flex;align-items:center;gap:10px">
              ${av(p.name,'av av-md '+(p.confirmedByTreasurer?'av-on':'av-off'))}
              <div><div style="font-size:14px;color:${p.confirmedByTreasurer?'var(--text)':'var(--muted)'}">${p.name}</div>
              ${p.selfDeclared&&!p.confirmedByTreasurer?`<div style="font-size:10px;color:var(--warn);margin-top:1px">Pendiente de confirmar</div>`:''}</div>
            </div>
            <div style="display:flex;gap:6px;align-items:center">${actions}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  document.getElementById('body-cuotas').innerHTML = html;
}

function doDeclarePaid(qid,name){
  const q=quotas.find(x=>x.id===qid);
  if(!q) return;
  const p=q.payments.find(x=>x.name===name);
  if(p){ p.selfDeclared=!p.selfDeclared; p.confirmedByTreasurer=false; }
  renderCuotas();
}
function doConfirmPay(qid,name){
  const q=quotas.find(x=>x.id===qid);
  if(!q) return;
  const p=q.payments.find(x=>x.name===name);
  if(p) p.confirmedByTreasurer=!p.confirmedByTreasurer;
  renderCuotas();
}

// ═══════════════════════════════ COLLA ═══════════════════════════════
function renderColla(){
  let html = `<div class="card card-dark" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div><div style="font-size:9px;letter-spacing:4px;color:var(--faint);text-transform:uppercase;margin-bottom:4px">Total</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent)">${MEMBERS.length} miembros</div></div>
    <div style="text-align:right"><div style="font-size:9px;letter-spacing:4px;color:var(--faint);text-transform:uppercase;margin-bottom:4px">Tesorero</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff">${TREASURER}</div></div>
  </div>
  <span class="lbl">Miembros</span>`;
  GROUPS.forEach(g=>{
    const avs = g.members.map((n,i)=>`<span style="margin-left:${i>0?'-8px':'0'};z-index:${i};position:relative">${av(n,'av av-lg '+(i===0?'av-on':'av-off'))}</span>`).join('');
    html += `<div class="group-card"><div class="group-avs">${avs}</div><div class="group-name">${g.members.join(" & ")}</div></div>`;
  });
  html += `<div class="divider"></div>
  <span class="lbl">Documentos</span>
  <div class="card" style="display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:14px;color:var(--text);margin-bottom:3px">Estatutos de la colla</div><div style="font-size:11px;color:var(--faint)">Documento oficial · PDF</div></div>
    <a href="https://example.com/estatutos-colla.pdf" target="_blank"><button class="btn-accent">Ver PDF</button></a>
  </div>`;
  document.getElementById('body-colla').innerHTML = html;
}

// ═══════════════════════════════ MODALS ══════════════════════════════
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeModalBg(e,id){ if(e.target===document.getElementById(id)) closeModal(id); }

// Evento type pills
function initEvTypePills(){
  evType = 'comida';
  document.getElementById('evTypePills').innerHTML = Object.entries(EVENT_TYPES).map(([key,val])=>
    `<span class="pill${key==='comida'?' on':''}" onclick="setEvType('${key}',this)">${val.label}</span>`
  ).join('');
  document.getElementById('evAgendaWrap').style.display='none';
}
function setEvType(type,el){
  evType=type;
  document.querySelectorAll('#evTypePills .pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('evAgendaWrap').style.display = type==='reunion'?'block':'none';
}

// ═══════════════════════════════ INIT ════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  renderMenu();
  // Pre-init ev type pills
  initEvTypePills();
  document.querySelector('[onclick="openModal(\'modalEvento\')"]')?.remove();
  // Patch fab in eventos
  document.querySelector('#sec-eventos .fab')?.addEventListener('click',()=>{
    initEvTypePills();
    openModal('modalEvento');
  });
});
</script>
