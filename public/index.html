<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#141410"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="La Colla"/>
<title>Colla Farem Curt</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"Colla Farem Curt","short_name":"La Colla","start_url":".","display":"standalone","background_color":"%23f2ede2","theme_color":"%23141410","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 512 512%27%3E%3Crect width=%27512%27 height=%27512%27 rx=%27110%27 fill=%27%23141410%27/%3E%3Ctext x=%27256%27 y=%27330%27 font-family=%27Arial Black,sans-serif%27 font-size=%27300%27 font-weight=%27900%27 fill=%27%237fff00%27 text-anchor=%27middle%27%3EC%3C/text%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml","purpose":"any maskable"}]}'/>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%23141410'/%3E%3Ctext x='256' y='330' font-family='Arial Black,sans-serif' font-size='300' font-weight='900' fill='%237fff00' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f2ede2;--paper:#faf7f0;--border:#d8d0c0;
  --text:#141410;--muted:#6e6860;--faint:#a8a098;
  --accent:#7fff00;--accentD:#3d8000;
  --line:#e4ddd0;--neg:#c0392b;--warn:#c07800;--warnL:#fff4e0;
  --black:#141410;
}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{display:none;}
input,textarea,select{outline:none;font-family:'DM Sans',sans-serif;}
input:focus,textarea:focus{border-color:var(--accentD)!important;}
textarea{resize:none;}

/* LOGIN / ¿QUIÉN ERES? */
#gate{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;max-width:480px;margin:0 auto;overflow-y:auto;}
.gate-header{background:var(--paper);border-bottom:1px solid var(--border);padding:44px 28px 30px;}
.gate-body{flex:1;padding:24px 22px 60px;}
.gate-q{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;margin-bottom:4px;color:var(--text);}
.gate-sub{font-size:12px;color:var(--muted);margin-bottom:22px;letter-spacing:.3px;}
.who-grid{display:flex;flex-direction:column;gap:8px;}
.who-group{margin-bottom:4px;}
.who-group-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--faint);margin:14px 0 8px;}
.who-btn{width:100%;display:flex;align-items:center;gap:13px;background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:13px 15px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .14s;text-align:left;}
.who-btn:hover{border-color:var(--accentD);transform:translateX(3px);}
.who-btn:active{transform:scale(.98);}
.who-name{font-size:15px;color:var(--text);font-weight:500;flex:1;}
.who-tre{font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--accentD);background:rgba(127,255,0,.16);padding:3px 7px;border-radius:4px;}

/* PIN */
.pin-box{background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:26px 22px;margin-top:8px;}
.pin-dots{display:flex;gap:12px;justify-content:center;margin:20px 0 24px;}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--border);transition:all .15s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-key{aspect-ratio:1.6;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.pin-key:active{background:var(--accent);color:var(--black);transform:scale(.95);}
.pin-key.fn{font-size:13px;letter-spacing:1px;font-family:'DM Sans',sans-serif;color:var(--muted);}
.pin-err{color:var(--neg);font-size:12px;text-align:center;margin-top:14px;height:16px;letter-spacing:.3px;}

/* SYNC BANNER */
#syncBar{position:fixed;top:0;left:50%;transform:translateX(-50%);background:var(--black);color:var(--accent);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:7px 18px;border-radius:0 0 10px 10px;z-index:900;opacity:0;transition:opacity .3s;pointer-events:none;font-weight:700;}
#syncBar.show{opacity:1;}

/* MENU */
.menu{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;}
.menu-header{background:var(--paper);border-bottom:1px solid var(--border);padding:36px 28px 28px;}
.eyebrow{font-size:9px;letter-spacing:5px;color:var(--faint);text-transform:uppercase;margin-bottom:8px;}
.logo-row{display:flex;align-items:center;gap:10px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--text);letter-spacing:3px;line-height:1;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px;}
.menu-user{margin-top:14px;display:flex;align-items:center;gap:9px;}
.menu-user-txt{font-size:11px;color:var(--muted);letter-spacing:.3px;}
.menu-user-txt b{color:var(--text);font-weight:700;}
.menu-switch{margin-left:auto;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);background:none;border:1px solid var(--border);border-radius:5px;padding:5px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.menu-switch:hover{border-color:var(--accentD);color:var(--accentD);}
.menu-list{flex:1;padding:0 28px;}
.menu-row{border-bottom:1px solid var(--line);padding:22px 0;display:flex;align-items:baseline;gap:16px;cursor:pointer;}
.menu-row:hover .menu-num,.menu-row:hover .menu-label,.menu-row:hover .menu-arrow{color:var(--accent)!important;}
.menu-num{font-size:11px;color:var(--faint);letter-spacing:2px;min-width:24px;transition:color .15s;}
.menu-label{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--text);letter-spacing:1px;line-height:1;flex:1;transition:color .15s;}
.menu-arrow{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--faint);transition:color .15s;}
.menu-badge{width:22px;height:22px;border-radius:50%;background:var(--accent);color:var(--black);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.menu-footer{padding:20px 28px;border-top:1px solid var(--line);font-size:10px;color:var(--faint);letter-spacing:2px;}

/* SECTION */
.section{min-height:100vh;background:var(--bg);display:none;}
.section.active{display:block;}
.sec-header{background:var(--paper);border-bottom:1px solid var(--border);padding:calc(20px + env(safe-area-inset-top)) 20px 0;position:sticky;top:0;z-index:200;}
.back-btn{display:inline-flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--border);border-radius:6px;padding:12px 18px;cursor:pointer;margin-bottom:16px;color:var(--text);-webkit-tap-highlight-color:rgba(127,255,0,.3);touch-action:manipulation;user-select:none;min-height:44px;}
.back-btn:active{background:var(--accent);border-color:var(--accent);}
.back-arrow{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--accent);}
.back-label{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;font-weight:500;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;color:var(--text);line-height:1;margin-bottom:16px;}
.sec-body{padding:20px 16px 80px;}

/* CARDS */
.card{background:var(--paper);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:10px;transition:box-shadow .18s;}
.card:hover{box-shadow:0 3px 14px rgba(0,0,0,.07);}
.card-click{cursor:pointer;}
.card-dark{background:var(--black);border:none;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);letter-spacing:.5px;}
.card-sub{font-size:12px;color:var(--muted);margin-top:3px;}

/* LABELS */
.lbl{font-size:9px;letter-spacing:4px;color:var(--faint);text-transform:uppercase;margin-bottom:8px;display:block;}
.tag{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:600;padding:2px 8px;border-radius:3px;white-space:nowrap;display:inline-block;}

/* BUTTONS */
.btn-accent{background:var(--accent);color:var(--black);border:none;border-radius:5px;padding:10px 20px;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;}
.btn-ghost{background:none;border:1px solid var(--border);border-radius:5px;padding:8px 14px;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);}
.btn-ghost:hover{border-color:var(--accentD);color:var(--accentD);}
.btn-dashed{width:100%;background:none;border:1px dashed var(--border);border-radius:6px;padding:13px;color:var(--muted);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:10px;}

/* FAB */
.fab{position:fixed;bottom:28px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:var(--black);border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(127,255,0,.4);font-weight:700;z-index:100;transition:transform .15s;}
.fab:hover{transform:scale(1.06);}
.fab:active{transform:scale(.94);}

/* INPUTS */
.inp-wrap{margin-bottom:14px;}
.inp-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block;}
.inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:10px 12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;}
textarea.inp{height:100px;}

/* PILLS */
.pill-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;}
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;user-select:none;}
.pill.on{background:var(--accent);color:var(--black);border-color:var(--accent);}
.pill:hover{opacity:.82;}

/* AVATAR */
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-family:'DM Sans',sans-serif;}
.av-sm{width:22px;height:22px;font-size:8px;background:var(--accent);color:var(--black);border:2px solid var(--accent);}
.av-md{width:28px;height:28px;font-size:10px;}
.av-lg{width:36px;height:36px;font-size:13px;}
.av-on{background:var(--accent);color:var(--black);border:2px solid var(--accent);}
.av-off{background:var(--line);color:var(--muted);border:1px solid var(--border);}

/* DIVIDER */
.divider{height:1px;background:var(--line);margin:12px 0;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(20,20,16,.55);display:flex;align-items:flex-end;z-index:300;display:none;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--paper);border-radius:14px 14px 0 0;padding:24px;width:100%;max-width:480px;margin:0 auto;max-height:90vh;overflow-y:auto;border-top:4px solid var(--accent);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--text);margin-bottom:20px;letter-spacing:1px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;}

/* PROGRESS BAR */
.progress-wrap{height:5px;background:var(--line);border-radius:3px;margin-bottom:4px;overflow:hidden;}
.progress-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .4s;}

/* POLL */
.poll-opt{border-radius:6px;border:1px solid var(--border);overflow:hidden;cursor:pointer;margin-bottom:8px;position:relative;}
.poll-opt.voted{border-color:var(--accent);background:rgba(127,255,0,.07);}
.poll-opt-inner{padding:10px 12px;position:relative;}
.poll-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(127,255,0,.15);border-radius:6px;transition:width .4s;}
.poll-content{position:relative;display:flex;justify-content:space-between;align-items:center;}
.poll-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;}
.poll-check.checked{background:var(--accent);border-color:var(--accent);}

/* TURNOS */
.turn-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);}
.turn-row:last-child{border-bottom:none;}
.turn-avs{display:flex;}
.turn-avs .av:not(:first-child){margin-left:-8px;}

/* SHOPPING */
.shop-item{display:flex;align-items:center;gap:12px;background:var(--paper);border:1px solid var(--border);border-radius:6px;padding:13px 16px;margin-bottom:8px;}
.shop-check{width:22px;height:22px;border-radius:4px;border:2px solid var(--border);background:none;cursor:pointer;flex-shrink:0;}
.shop-check.done{background:var(--accent);border-color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--black);font-weight:700;}
.shop-del{background:none;border:none;color:var(--faint);font-size:20px;cursor:pointer;line-height:1;}

/* CUOTAS */
.quota-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);}
.quota-row:last-child{border-bottom:none;}

/* EVENT DETAIL */
.ev-type-tag{display:inline-block;margin-bottom:6px;}
.ev-big-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;color:var(--text);line-height:1;margin-bottom:4px;}
.ev-date{font-size:12px;color:var(--muted);margin-bottom:14px;text-transform:capitalize;}

/* ATTEND PILLS */
.attend-grid{display:flex;flex-wrap:wrap;gap:5px;}

/* COLLA */
.group-card{background:var(--paper);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
.group-avs{display:flex;}
.group-avs .av:not(:first-child){margin-left:-8px;}
.group-name{font-size:15px;color:var(--text);font-weight:500;}

/* WARN CARD */
.warn-card{background:var(--warnL);border:1px solid rgba(192,120,0,.33);border-radius:6px;padding:16px;margin-bottom:10px;}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg);z-index:1100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;max-width:480px;margin:0 auto;}
.spin{width:38px;height:38px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--faint);}
</style>
</head>
<body>

<!-- ═══════════════════════════════ LOADER ═════════════════════════════ -->
<div id="loader"><div class="spin"></div><div class="load-txt">Conectando…</div></div>

<!-- ═══════════════════════════════ SYNC BAR ════════════════════════════ -->
<div id="syncBar">Sincronizado</div>

<!-- ═══════════════════════════════ GATE ═══════════════════════════════ -->
<div id="gate" style="display:none">
  <div class="gate-header">
    <div class="eyebrow">Castelló de la Plana</div>
    <div class="logo-row"><div class="logo">LA COLLA</div><div class="dot"></div></div>
  </div>
  <div class="gate-body" id="gateBody"></div>
</div>

<!-- ═══════════════════════════════ MENU ═══════════════════════════════ -->
<div class="menu" id="mainMenu" style="display:none">
  <div class="menu-header">
    <div class="eyebrow">Castelló de la Plana</div>
    <div class="logo-row">
      <div class="logo">LA COLLA</div>
      <div class="dot"></div>
    </div>
    <div class="menu-user">
      <span class="av av-md av-on" id="meAv"></span>
      <span class="menu-user-txt">Hola, <b id="meName"></b></span>
      <button class="menu-switch" onclick="logout()">Cambiar</button>
    </div>
  </div>
  <div class="menu-list" id="menuList"></div>
  <div class="menu-footer" id="menuFooter"></div>
</div>

<!-- ═══════════════════════════════ SECTIONS ═══════════════════════════ -->
<div class="section" id="sec-eventos">
  <div class="sec-header">
    <button class="back-btn" onclick="goMenu()"><span class="back-arrow">←</span><span class="back-label">Menú</span></button>
    <div class="sec-title">Eventos</div>
  </div>
  <div class="sec-body" id="body-eventos"></div>
  <button class="fab" onclick="openEventoModal()">+</button>
</div>

<div class="section" id="sec-caja">
  <div class="sec-header">
    <button class="back-btn" onclick="goMenu()"><span class="back-arrow">←</span><span class="back-label">Menú</span></button>
    <div class="sec-title">Caja</div>
  </div>
  <div class="sec-body" id="body-caja"></div>
</div>

<div class="section" id="sec-compra">
  <div class="sec-header">
    <button class="back-btn" onclick="goMenu()"><span class="back-arrow">←</span><span class="back-label">Menú</span></button>
    <div class="sec-title">Lista de la compra</div>
  </div>
  <div class="sec-body" id="body-compra"></div>
  <button class="fab" onclick="openModal('modalShop')">+</button>
</div>

<div class="section" id="sec-turnos">
  <div class="sec-header">
    <button class="back-btn" onclick="goMenu()"><span class="back-arrow">←</span><span class="back-label">Menú</span></button>
    <div class="sec-title">Turnos</div>
  </div>
  <div class="sec-body" id="body-turnos"></div>
</div>

<div class="section" id="sec-cuotas">
  <div class="sec-header">
    <button class="back-btn" onclick="goMenu()"><span class="back-arrow">←</span><span class="back-label">Menú</span></button>
    <div class="sec-title">Cuotas</div>
  </div>
  <div class="sec-body" id="body-cuotas"></div>
</div>

<div class="section" id="sec-colla">
  <div class="sec-header">
    <button class="back-btn" onclick="goMenu()"><span class="back-arrow">←</span><span class="back-label">Menú</span></button>
    <div class="sec-title">Colla</div>
  </div>
  <div class="sec-body" id="body-colla"></div>
</div>

<!-- EVENT DETAIL -->
<div class="section" id="sec-evdetail">
  <div class="sec-header">
    <button class="back-btn" onclick="goSection('eventos')"><span class="back-arrow">←</span><span class="back-label">Eventos</span></button>
    <div id="evdetail-header"></div>
  </div>
  <div class="sec-body" id="body-evdetail"></div>
</div>

<!-- ═══════════════════════════════ MODALS ════════════════════════════ -->
<div class="modal-overlay" id="modalEvento" onclick="closeModalBg(event,'modalEvento')">
  <div class="modal-box">
    <div class="modal-title">Nuevo Evento</div>
    <div class="inp-wrap">
      <label class="inp-label">Tipo</label>
      <div class="pill-row" id="evTypePills"></div>
    </div>
    <div class="inp-wrap"><label class="inp-label">Título</label><input class="inp" id="evTitle" placeholder="Ej: Paella valenciana"/></div>
    <div class="inp-wrap"><label class="inp-label">Fecha</label><input class="inp" type="date" id="evDate"/></div>
    <div class="inp-wrap"><label class="inp-label">Hora</label><input class="inp" type="time" id="evTime"/></div>
    <div class="inp-wrap"><label class="inp-label">Descripción</label><input class="inp" id="evDesc" placeholder="Detalles..."/></div>
    <div id="evAgendaWrap" style="display:none" class="inp-wrap"><label class="inp-label">Orden del día</label><textarea class="inp" id="evAgenda" placeholder="1. Punto uno&#10;2. Punto dos"></textarea></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modalEvento')">Cancelar</button>
      <button class="btn-accent" onclick="addEvento()">Crear</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalCompra" onclick="closeModalBg(event,'modalCompra')">
  <div class="modal-box">
    <div class="modal-title">Registrar Compra</div>
    <div class="inp-wrap"><label class="inp-label">Qué se compró</label><input class="inp" id="compraWhat" placeholder="Ej: Papel higiénico"/></div>
    <div class="inp-wrap"><label class="inp-label">Importe (€)</label><input class="inp" type="number" id="compraAmt" placeholder="0.00"/></div>
    <div class="inp-wrap"><label class="inp-label">Quién pagó</label><div class="pill-row" id="compraWhoPills"></div></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modalCompra')">Cancelar</button>
      <button class="btn-accent" onclick="addCompra()">Añadir</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalShop" onclick="closeModalBg(event,'modalShop')">

<script type="module">
// ═══════════════════════════════════════════════════════════════════════
//  FIREBASE
// ═══════════════════════════════════════════════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, setDoc, updateDoc, deleteDoc, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAPCswvXmDJlTn7PKrdOb_WCKcTqfyEgNA",
  authDomain: "app-colla.firebaseapp.com",
  projectId: "app-colla",
  storageBucket: "app-colla.firebasestorage.app",
  messagingSenderId: "235447122137",
  appId: "1:235447122137:web:d06e1e6e487159ec7e26c8",
  measurementId: "G-FX4HDRRS3P"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// Exponer helpers de Firestore al scope global (el resto del código no es módulo)
window.DB = { db, collection, doc, onSnapshot, setDoc, updateDoc, deleteDoc, getDocs };
window.dispatchEvent(new Event('firebase-ready'));
</script>

<script>
// El grueso de la app se carga aquí (no-module) una vez Firebase está listo.
window.addEventListener('firebase-ready', () => { window.__startApp(); });
</script>
<script>
// ═══════════════════════════════════════════════════════════════════════
//  COLLA FAREM CURT · app definitiva con Firebase
// ═══════════════════════════════════════════════════════════════════════

// ───────────────────────── CONFIG ESTÁTICA ─────────────────────────────
const APP_VERSION = 5; // ↑ Súbelo en cada despliegue para forzar actualización en todos los móviles
const TREASURER = "Edu";
let ME = null; // se define en el login

const GROUPS = [
  {id:1,  members:["David","Carmen"]},
  {id:2,  members:["Inma","Roky"]},
  {id:3,  members:["Carla","Fran"]},
  {id:4,  members:["Ari","Diego"]},
  {id:5,  members:["Maria","Edu"]},
  {id:6,  members:["Patri","Gonzalo"]},
  {id:7,  members:["Sergio","Sandri"]},
  {id:8,  members:["Alejandro","Yani"]},
  {id:9,  members:["Zurine","Carlos"]},
  {id:10, members:["Guille","Lledo"]},
  {id:11, members:["Marta","Raquel","Adrián"]},
];
const MEMBERS = GROUPS.flatMap((g)=>g.members.map((name)=>({name,groupId:g.id})))
  .map((m,i)=>({...m,id:i+1}));

const EVENT_TYPES = {
  comida:{label:"Comida",color:"#3d8000"},
  cena:{label:"Cena",color:"#5a6ea8"},
  reunion:{label:"Reunión",color:"#c07800"},
  otro:{label:"Evento",color:"#6e6860"},
};

// ───────────────────────── ESTADO (espejo de Firestore) ────────────────
let events = [];
let compras = [];
let turns = [];
let quotas = [];
let shopping = [];

let activeEvId = null;
let pollMulti = false;
let pollOpts = ["","",""];
let editTurnGroup = null;
let compraWho = null;
let evExpWho = null;
let evType = "comida";
let currentSection = null;
let dataReady = {events:false,compras:false,turns:false,quotas:false,shopping:false};

// ───────────────────────── TURNOS POR DEFECTO (solo memoria) ───────────
// La app NUNCA escribe datos automáticamente en Firebase. Si la colección
// turns está vacía, se muestran los 11 grupos por defecto sin guardarlos.
const DEFAULT_TURNS = GROUPS.map((g)=>({id:g.id,group:g.id,date:"",note:"",done:false}));

// ───────────────────────── FIRESTORE SYNC ──────────────────────────────
let DB = null;
const COLLECTIONS = ["events","compras","turns","quotas","shopping"];

function showSync(txt="Sincronizado"){
  const b = document.getElementById('syncBar');
  b.textContent = txt; b.classList.add('show');
  clearTimeout(window.__syncT);
  window.__syncT = setTimeout(()=>b.classList.remove('show'),1400);
}

// Guarda un documento (un item) en su colección. id = clave del doc.
async function fbSet(coll, item){
  try{
    await DB.setDoc(DB.doc(DB.db, coll, String(item.id)), item);
    showSync("Guardado");
  }catch(e){ console.error("Error guardando",coll,e); showSync("Error de red"); }
}
async function fbDelete(coll, id){
  try{
    await DB.deleteDoc(DB.doc(DB.db, coll, String(id)));
    showSync("Guardado");
  }catch(e){ console.error("Error borrando",coll,e); showSync("Error de red"); }
}

// Mapea colección → variable local
function setLocal(coll, arr){
  if(coll==="events") events = arr;
  if(coll==="compras") compras = arr;
  if(coll==="turns"){
    // Siempre mostramos los 11 grupos; los que estén en Firebase sobrescriben al defecto
    turns = DEFAULT_TURNS.map(def=>{
      const saved = arr.find(t=>t.group===def.group);
      return saved ? saved : def;
    });
  }
  if(coll==="quotas") quotas = arr;
  if(coll==="shopping") shopping = arr;
}

// Suscribe a todas las colecciones en tiempo real
function subscribeAll(){
  COLLECTIONS.forEach(coll=>{
    DB.onSnapshot(DB.collection(DB.db, coll), snap=>{
      const arr = [];
      snap.forEach(d=>arr.push(d.data()));
      // ordena por id numérico para estabilidad
      arr.sort((a,b)=>(a.id||0)-(b.id||0));
      setLocal(coll, arr);
      dataReady[coll] = true;
      onData(coll, snap.empty);
    }, err=>{
      console.error("onSnapshot error",coll,err);
      showSync("Error de conexión");
    });
  });
}

// La app NO siembra datos automáticamente. Firebase manda siempre.
function allReady(){ return COLLECTIONS.every(c=>dataReady[c]); }

function onData(coll, empty){
  if(allReady()){
    document.getElementById('loader').style.display='none';
    // Si ya estamos logueados y en una sección, re-render en vivo
    if(ME){
      if(currentSection) renderSection(currentSection);
      if(document.getElementById('sec-evdetail').classList.contains('active')) renderEvDetail();
      renderMenu();
    }
  }
}

// ───────────────────────── CONTROL DE VERSIÓN ──────────────────────────
// Un doc en Firestore (meta/app) guarda la versión mínima requerida.
// Si esta app es más vieja, se recarga sola → mata las versiones zombi.
let versionChecked = false;
function watchVersion(){
  DB.onSnapshot(DB.doc(DB.db,"meta","app"), snap=>{
    const data = snap.exists() ? snap.data() : null;
    const required = data && typeof data.minVersion==="number" ? data.minVersion : 0;
    if(required > APP_VERSION){
      // Esta app está obsoleta → recarga forzando red (sin caché)
      try{ localStorage.setItem('colla_reload', Date.now()); }catch(e){}
      location.reload(true);
      return;
    }
    versionChecked = true;
  }, err=>{ versionChecked = true; });
}

// ───────────────────────── ARRANQUE ────────────────────────────────────
window.__startApp = function(){
  DB = window.DB;
  watchVersion();
  subscribeAll();
  initEvTypePills();
  // failsafe: si en 6s no ha cargado, mostrar login igual
  setTimeout(()=>{
    document.getElementById('loader').style.display='none';
    if(!ME) renderGate();
  }, 6000);
  // mostrar login en cuanto haya datos (o ya)
  const waitGate = setInterval(()=>{
    if(allReady()){
      clearInterval(waitGate);
      const saved = localStorage.getItem('colla_me');
      if(saved && MEMBERS.some(m=>m.name===saved)){ ME = saved; enterApp(); }
      else renderGate();
    }
  }, 120);
};

// ═══════════════════════════════ LOGIN ═══════════════════════════════
function renderGate(){
  document.getElementById('loader').style.display='none';
  document.getElementById('gate').style.display='flex';
  document.getElementById('mainMenu').style.display='none';
  const body = document.getElementById('gateBody');
  let html = `<div class="gate-q">¿Quién eres?</div>
    <div class="gate-sub">Toca tu nombre para entrar.</div>
    <div class="who-grid">`;
  GROUPS.forEach(g=>{
    html += `<div class="who-group"><div class="who-group-label">Grupo ${g.id} · ${g.members.join(" & ")}</div>`;
    g.members.forEach(name=>{
      const isTre = name===TREASURER;
      html += `<button class="who-btn" onclick="pickMe('${name}')">
        ${av(name,'av av-md '+(isTre?'av-on':'av-off'))}
        <span class="who-name">${name}</span>
        ${isTre?`<span class="who-tre">Tesorero</span>`:''}
      </button>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  body.innerHTML = html;
}

let pinBuffer = "";
function pickMe(name){
  ME = name;
  localStorage.setItem('colla_me', name);
  enterApp();
}

function renderPin(){
  pinBuffer = "";
  const body = document.getElementById('gateBody');
  body.innerHTML = `
    <button class="btn-ghost" style="margin-bottom:18px" onclick="renderGate()">← Volver</button>
    <div class="gate-q">Hola, Edu</div>
    <div class="gate-sub">Introduce tu clave de tesorero.</div>
    <div class="pin-box">
      <div class="pin-dots" id="pinDots"></div>
      <div class="pin-pad" id="pinPad"></div>
      <div class="pin-err" id="pinErr"></div>
    </div>`;
  renderPinDots();
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  document.getElementById('pinPad').innerHTML = keys.map(k=>{
    if(k==='') return `<div></div>`;
    if(k==='⌫') return `<button class="pin-key fn" onclick="pinDel()">⌫</button>`;
    return `<button class="pin-key" onclick="pinPress('${k}')">${k}</button>`;
  }).join('');
}
function renderPinDots(){
  let h=''; for(let i=0;i<4;i++) h+=`<div class="pin-dot ${i<pinBuffer.length?'filled':''}"></div>`;
  document.getElementById('pinDots').innerHTML=h;
}
function pinPress(d){
  if(pinBuffer.length>=4) return;
  pinBuffer+=d; renderPinDots();
  if(pinBuffer.length===4){
    setTimeout(()=>{
      if(pinBuffer===TREASURER_PIN){
        ME = TREASURER; localStorage.setItem('colla_me',TREASURER); enterApp();
      } else {
        document.getElementById('pinErr').textContent='Clave incorrecta';
        pinBuffer=''; renderPinDots();
      }
    },120);
  }
}
function pinDel(){ pinBuffer=pinBuffer.slice(0,-1); document.getElementById('pinErr').textContent=''; renderPinDots(); }

function enterApp(){
  compraWho = ME; evExpWho = ME;
  document.getElementById('gate').style.display='none';
  document.getElementById('meAv').textContent = ini(ME);
  document.getElementById('meName').textContent = ME + (ME===TREASURER?' · Tesorero':'');
  goMenu();
}
function logout(){
  ME=null; localStorage.removeItem('colla_me');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('mainMenu').style.display='none';
  renderGate();
}

// ═══════════════════════════════ HELPERS ══════════════════════════════
const ini = n => n ? n[0].toUpperCase() : "?";
const gm = id => MEMBERS.find(m=>m.id===id);
const gg = id => GROUPS.find(g=>g.id===id);
const fmtD = s => {
  const d = new Date(s+"T12:00:00");
  return { day:d.getDate(), mon:d.toLocaleDateString("es-ES",{month:"short"}), wday:d.toLocaleDateString("es-ES",{weekday:"long"}) };
};
const av = (name,cls="av-md av-off") => `<span class="av ${cls}">${ini(name)}</span>`;
const tag = (text,color,bg) => `<span class="tag" style="color:${color};background:${bg||color+'18'}">${text}</span>`;
const clone = o => JSON.parse(JSON.stringify(o));

// ═══════════════════════════════ NAVIGATION ═══════════════════════════
function goMenu(){
  currentSection=null;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('mainMenu').style.display='flex';
  renderMenu();
}
function goSection(key){
  currentSection=key;
  document.getElementById('mainMenu').style.display='none';
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  const s = document.getElementById('sec-'+key);
  if(s) s.classList.add('active');
  renderSection(key);
}
function renderSection(key){
  if(key==='eventos') renderEventos();
  if(key==='caja') renderCaja();
  if(key==='compra') renderCompra();
  if(key==='turnos') renderTurnos();
  if(key==='cuotas') renderCuotas();
  if(key==='colla') renderColla();
}

// ═══════════════════════════════ MENU ═════════════════════════════════
const MENU_ITEMS = [
  {key:"eventos",label:"Eventos",num:"01"},
  {key:"caja",label:"Caja",num:"02"},
  {key:"compra",label:"La compra",num:"03"},
  {key:"turnos",label:"Turnos",num:"04"},
  {key:"cuotas",label:"Cuotas",num:"05"},
  {key:"colla",label:"Colla",num:"06"},
];
function getBadge(key){
  if(key==='eventos') return events.reduce((s,e)=>s+(e.polls||[]).filter(p=>p.open).length,0)||null;
  if(key==='caja') return compras.filter(c=>!c.reintegrated).length||null;
  if(key==='compra') return shopping.filter(s=>!s.done).length||null;
  if(key==='cuotas') return quotas.reduce((s,q)=>s+(q.payments||[]).filter(p=>!p.confirmedByTreasurer&&p.selfDeclared).length,0)||null;
  return null;
}
function renderMenu(){
  const list = document.getElementById('menuList');
  if(!list) return;
  list.innerHTML = MENU_ITEMS.map(item=>{
    const b = getBadge(item.key);
    return `<div class="menu-row" onclick="goSection('${item.key}')">
      <span class="menu-num">${item.num}</span>
      <span class="menu-label">${item.label}</span>
      ${b ? `<span class="menu-badge">${b}</span>` : ''}
      <span class="menu-arrow">›</span>
    </div>`;
  }).join('');
  document.getElementById('menuFooter').textContent = `${MEMBERS.length} miembros · Tesorero: ${TREASURER}`;
}
</script>
<script>
// ═══════════════════════════════ EVENTOS ═════════════════════════════
function renderEventos(){
  const sorted = [...events].sort((a,b)=>a.date>b.date?1:-1);
  document.getElementById('body-eventos').innerHTML = `
    <span class="lbl">Próximos eventos</span>
    ${sorted.length===0?`<div style="font-size:13px;color:var(--faint);font-style:italic">Aún no hay eventos. Crea el primero con el botón +.</div>`:''}
    ${sorted.map(ev=>{
      const {day,mon} = fmtD(ev.date);
      const total = (ev.expenses||[]).reduce((s,x)=>s+x.amount,0);
      const et = EVENT_TYPES[ev.type]||EVENT_TYPES.otro;
      const openP = (ev.polls||[]).filter(p=>p.open).length;
      const atavs = ev.attendees.slice(0,9).map(id=>av(gm(id)?.name,'av av-sm av-on')).join('');
      return `<div class="card card-click" onclick="openEvDetail(${ev.id})">
        <div style="display:flex;gap:14px;align-items:flex-start">
          <div style="text-align:center;min-width:42px;flex-shrink:0">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;color:var(--text)">${day}</div>
            <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--faint)">${mon}</div>
          </div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:5px;flex-wrap:wrap">
              <div class="card-title">${ev.title}</div>
              ${tag(et.label,et.color)}
            </div>
            ${ev.description ? `<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px">${ev.description}</div>` : ''}
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              ${tag(ev.attendees.length+' apuntados','#6e6860')}
              ${total>0 ? tag(total.toFixed(2)+' €','#3d8000') : ''}
              ${openP>0 ? tag(openP+' votación'+(openP>1?'es':''),'#5a6ea8') : ''}
              ${ev.type==='reunion'&&ev.agenda ? tag('Orden del día','#c07800') : ''}
            </div>
            ${ev.attendees.length>0 ? `<div style="margin-top:8px;display:flex;gap:3px;flex-wrap:wrap">${atavs}${ev.attendees.length>9?`<span style="font-size:11px;color:var(--faint);align-self:center">+${ev.attendees.length-9}</span>`:''}</div>` : ''}
          </div>
          <span style="color:var(--faint);font-size:20px;align-self:center">›</span>
        </div>
      </div>`;
    }).join('')}
  `;
}

function openEvDetail(evId){
  activeEvId = evId;
  currentSection=null;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-evdetail').classList.add('active');
  renderEvDetail();
}

function renderEvDetail(){
  const ev = events.find(e=>e.id===activeEvId);
  if(!ev) return;
  const {day,mon,wday} = fmtD(ev.date);
  const et = EVENT_TYPES[ev.type]||EVENT_TYPES.otro;
  const isReu = ev.type==='reunion';
  const total = (ev.expenses||[]).reduce((s,x)=>s+x.amount,0);
  const perHead = ev.attendees.length>0&&total>0 ? (total/ev.attendees.length).toFixed(2) : null;

  document.getElementById('evdetail-header').innerHTML = `
    <div>${tag(et.label,et.color)}</div>
    <div class="ev-big-title">${ev.title}</div>
    <div class="ev-date">${wday} ${day} ${mon} · ${ev.time}</div>
  `;

  let html = '';
  if(ev.description) html += `<div style="font-size:13px;color:var(--muted);font-style:italic;margin-bottom:18px">${ev.description}</div>`;
  if(isReu && ev.agenda){
    html += `<span class="lbl">Orden del día</span>
    <div class="warn-card"><div style="font-size:13px;color:var(--text);white-space:pre-line;line-height:1.7">${ev.agenda}</div></div>`;
  }
  if((ev.polls||[]).length>0){
    html += `<span class="lbl" style="margin-top:16px">Votaciones</span>`;
    ev.polls.forEach(p=>{ html += renderPollHTML(p, ev.id); });
  }
  html += `<button class="btn-dashed" onclick="openPollModal()">+ Nueva votación</button>`;

  html += `<span class="lbl" style="margin-top:8px">Apuntados (${ev.attendees.length})</span>
  <div class="card"><div class="attend-grid">
    ${MEMBERS.map(m=>{
      const on = ev.attendees.includes(m.id);
      return `<span class="pill${on?' on':''}" onclick="toggleAtt(${ev.id},${m.id})">
        ${av(m.name, 'av '+(on?'av-on':'av-off'))} ${m.name}
      </span>`;
    }).join('')}
  </div></div>`;

  if(!isReu){
    html += `<span class="lbl" style="margin-top:18px">Gastos del evento</span>`;
    if((ev.expenses||[]).length===0) html += `<div style="font-size:13px;color:var(--faint);font-style:italic;margin-bottom:10px">Sin gastos registrados.</div>`;
    (ev.expenses||[]).forEach(x=>{
      html += `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:14px;color:var(--text);margin-bottom:3px">${x.what}</div><div style="font-size:12px;color:var(--muted)">Pagó ${x.who}</div></div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text)">${x.amount.toFixed(2)} €</div>
      </div></div>`;
    });
    html += `<button class="btn-dashed" onclick="openModal('modalEvExp');initEvExpPills()">+ Añadir gasto</button>`;
    if(perHead){
      html += `<div class="card card-dark" style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:9px;letter-spacing:3px;color:var(--faint);text-transform:uppercase;margin-bottom:4px">Total evento</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:#fff">${total.toFixed(2)} €</div></div>

function renderPollHTML(p, evId){
  const totalV = [...new Set(p.options.flatMap(o=>o.votes))].length;
  const myVotes = p.options.filter(o=>o.votes.includes(ME)).map(o=>o.id);
  const maxV = Math.max(...p.options.map(o=>o.votes.length),1);
  let html = `<div class="card" style="border-left:4px solid var(--accent)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">

        <div style="display:flex;gap:6px;flex-wrap:wrap">

          ${tag(totalV+' votos','#a8a098')}
          ${!p.open?tag('Cerrada','#c0392b'):''}
        </div>
      </div>
      ${p.open?`<button class="btn-ghost" style="font-size:9px;padding:4px 10px" onclick="closePoll(${evId},${p.id})">Cerrar</button>`:''}
    </div>`;
  p.options.forEach(opt=>{
    const voted = myVotes.includes(opt.id);

    const winner = !p.open && opt.votes.length===maxV && opt.votes.length>0;
    html += `<div class="poll-opt${voted?' voted':''}" onclick="${p.open?`castVote(${evId},${p.id},${opt.id},${p.multi})`:''}">
      <div class="poll-opt-inner">
        <div class="poll-fill" style="width:${pct}%"></div>

            <div class="poll-check${voted?' checked':''}">${voted?'✓':''}</div>
            <span style="font-size:13px;color:var(--text)">${opt.text}</span>
            ${winner?tag('Ganadora','#3d8000'):''}
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:12px;color:var(--muted)">${opt.votes.length}</span>

          </div>

  html += `</div>`;
  return html;
}

// — Mutaciones de eventos → Firestore —
function toggleAtt(evId,mid){
  const ev = events.find(e=>e.id===evId); if(!ev) return;
  const next = clone(ev);
  const idx = next.attendees.indexOf(mid);
  if(idx>-1) next.attendees.splice(idx,1); else next.attendees.push(mid);
  fbSet('events', next);
}
function castVote(evId,pollId,optId,multi){
  const ev = events.find(e=>e.id===evId); if(!ev) return;
  const next = clone(ev);
  const p = next.polls.find(x=>x.id===pollId);
  if(!p||!p.open) return;
  p.options.forEach(o=>{
    if(o.id===optId){
      const i=o.votes.indexOf(ME);
      if(i>-1) o.votes.splice(i,1); else o.votes.push(ME);
    } else if(!multi){
      const i=o.votes.indexOf(ME);
      if(i>-1) o.votes.splice(i,1);
    }
  });
  fbSet('events', next);
}
function closePoll(evId,pollId){
  const ev = events.find(e=>e.id===evId); if(!ev) return;
  const next = clone(ev);
  const p = next.polls.find(x=>x.id===pollId);
  if(p) p.open=false;
  fbSet('events', next);
}

// Da formato a un fin de semana a partir del sábado (YYYY-MM-DD)
function fmtFinde(satStr){
  if(!satStr) return null;
  const sat = new Date(satStr+"T12:00:00");
  const sun = new Date(sat); sun.setDate(sat.getDate()+1);
  const mesS = sat.toLocaleDateString("es-ES",{month:"short"});
  const mesD = sun.toLocaleDateString("es-ES",{month:"short"});
  if(mesS===mesD) return `Finde ${sat.getDate()}–${sun.getDate()} ${mesS}`;
  return `Finde ${sat.getDate()} ${mesS} – ${sun.getDate()} ${mesD}`;
}

function renderTurnos(){
  // Copia ordenada: primero los que tienen fecha (por fecha asc), luego sin fecha
  const list = turns.map((t,idx)=>({...t,_idx:idx}));
  const dated = list.filter(t=>t.date).sort((a,b)=>a.date<b.date?-1:1);
  const undated = list.filter(t=>!t.date);
  const ordered = [...dated, ...undated];
  // El "próximo" = primer turno con fecha >= hoy y no completado
  const today = new Date().toISOString().split("T")[0];
  const nextTurn = dated.find(t=>t.date>=today && !t.done);

  let html = `<div style="font-size:12px;color:var(--warn);background:var(--warnL);border:1px solid rgba(192,120,0,.33);border-radius:6px;padding:10px 12px;margin-bottom:14px">Cada pareja se encarga de la limpieza y compra su fin de semana. Agenda la fecha que os toque; si una semana no se hace, se reagenda.</div>`;
  html += `<span class="lbl">Turnos por pareja</span>`;
  ordered.forEach(t=>{
    const group = gg(t.group);
    const isNext = nextTurn && t.id===nextTurn.id && t.group===nextTurn.group;
    const findeTxt = fmtFinde(t.date);
    const avs = (group?.members||[]).map((n,ni)=>`<span style="margin-left:${ni>0?'-8px':'0'};z-index:${ni};position:relative">${av(n,'av av-md '+(isNext?'av-on':'av-off'))}</span>`).join('');
    html += `<div class="card" style="border-left:4px solid ${isNext?'var(--accent)':'var(--border)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div style="display:flex;align-items:center;gap:10px;min-width:0">
          <div class="turn-avs">${avs}</div>
          <div style="min-width:0">
            <div style="font-size:14px;font-weight:${isNext?600:400};color:${isNext?'var(--text)':'var(--muted)'}">${(group?.members||[]).join(" & ")}</div>
            <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center">
              ${isNext?tag('Esta semana','#3d8000'):''}
              ${t.done?tag('Completado','#3d8000'):''}
              ${findeTxt?`<span style="font-size:12px;color:${isNext?'var(--accentD)':'var(--muted)'};font-weight:500">${findeTxt}</span>`:`<span style="font-size:12px;color:var(--faint);font-style:italic">Sin fecha</span>`}
            </div>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">
        <button class="btn-ghost" style="font-size:9px;padding:6px 12px" onclick="openTurnDate(${t.group})">${t.date?'Cambiar fecha':'Agendar finde'}</button>
        <button class="btn-ghost" style="font-size:9px;padding:6px 12px" onclick="openTurnNote(${t.group})">${t.note?'Editar nota':'+ Nota'}</button>
        ${t.done?`<button class="btn-ghost" style="font-size:9px;padding:6px 12px" onclick="toggleTurnDone(${t.group})">Reabrir</button>`:`<button class="btn-ghost" style="font-size:9px;padding:6px 12px;border-color:var(--accentD);color:var(--accentD)" onclick="toggleTurnDone(${t.group})">Marcar hecho</button>`}
      </div>
      ${t.note?`<div style="font-size:13px;color:var(--muted);background:var(--bg);border-radius:5px;padding:10px 12px;line-height:1.5;font-style:italic;margin-top:10px">${t.note}</div>`:''}
    </div>`;
  });
  document.getElementById('body-turnos').innerHTML = html;
}

            badge = tag('Pagado','#c07800');
            if(isTr) action = `<button class="btn-accent" style="font-size:9px;padding:5px 11px" onclick="cuotaConfirm(${q.id},'${p.name}',true)">✓ Confirmar</button>`;
            else action = `<button class="btn-ghost" style="font-size:9px;padding:4px 9px" onclick="cuotaPaid(${q.id},'${p.name}',false)">Quitar</button>`;
          } else {
            badge = tag('Pendiente','#c0392b');
            action = `<button class="btn-ghost" style="font-size:9px;padding:5px 11px;border-color:var(--accentD);color:var(--accentD)" onclick="cuotaPaid(${q.id},'${p.name}',true)">Marcar pagado</button>`;
          }
          const st = p.confirmedByTreasurer?'av-on':(p.selfDeclared?'av-on':'av-off');
          return `<div class="quota-row">
            <div style="display:flex;align-items:center;gap:10px;min-width:0">
              ${av(p.name,'av av-md '+st)}
              <div style="min-width:0">
                <div style="font-size:14px;color:${p.confirmedByTreasurer?'var(--text)':'var(--muted)'}">${p.name}${p.name===ME?' <span style="font-size:9px;color:var(--faint)">(tú)</span>':''}</div>
                <div style="margin-top:2px">${badge}</div>
              </div>
            </div>
            <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">${action}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  if(ME===TREASURER){
    html += `<button class="btn-dashed" onclick="addQuota()">+ Crear cuota mensual</button>`;
  }
  document.getElementById('body-cuotas').innerHTML = html;
}
function addQuota(){
  const month = prompt("¿De qué mes es la cuota?", new Date().toLocaleDateString("es-ES",{month:"long",year:"numeric"}));
  if(month===null) return;
  const amountStr = prompt("Importe en € por miembro:", "30");
  if(amountStr===null) return;
  const amount = parseFloat(amountStr); if(isNaN(amount)) return;
  const nextId = (quotas.reduce((m,q)=>Math.max(m,q.id),0))+1;
  fbSet('quotas', {
    id: nextId, concept: "Cuota mensual", amount, month: month.trim()||"Cuota",
    payments: MEMBERS.map(m=>({name:m.name,selfDeclared:false,confirmedByTreasurer:false})),
  });
}
function deleteQuota(qid){
  const q=quotas.find(x=>x.id===qid); if(!q) return;
  if(!confirm(`¿Eliminar la cuota "${q.concept} · ${q.month}"?\n\nNo se puede deshacer.`)) return;
  fbDelete('quotas', qid);
}
// Cualquiera marca/desmarca "pagado". Si lo desmarca, también quita confirmación.
function cuotaPaid(qid,name,val){
  const q=quotas.find(x=>x.id===qid); if(!q) return;
  const n=clone(q); const p=n.payments.find(x=>x.name===name);
  if(p){ p.selfDeclared=val; if(!val) p.confirmedByTreasurer=false; }
  fbSet('quotas', n);
}
// Solo Edu confirma/deshace.
function cuotaConfirm(qid,name,val){
  if(ME!==TREASURER) return;
  const q=quotas.find(x=>x.id===qid); if(!q) return;
  const n=clone(q); const p=n.payments.find(x=>x.name===name);
  if(p){ p.confirmedByTreasurer=val; if(val) p.selfDeclared=true; }
  fbSet('quotas', n);
}

// ═══════════════════════════════ COLLA ═══════════════════════════════
function renderColla(){
  let html = `<div class="card card-dark" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div><div style="font-size:9px;letter-spacing:4px;color:var(--faint);text-transform:uppercase;margin-bottom:4px">Total</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent)">${MEMBERS.length} miembros</div></div>
    <div style="text-align:right"><div style="font-size:9px;letter-spacing:4px;color:var(--faint);text-transform:uppercase;margin-bottom:4px">Tesorero</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff">${TREASURER}</div></div>
  </div>
  <span class="lbl">Grupos (${GROUPS.length})</span>`;
  GROUPS.forEach(g=>{
    const avs = g.members.map((n,i)=>`<span style="margin-left:${i>0?'-8px':'0'};z-index:${i};position:relative">${av(n,'av av-lg '+(g.members.includes(ME)&&n===ME?'av-on':(i===0?'av-on':'av-off')))}</span>`).join('');
    html += `<div class="group-card"><div class="group-avs">${avs}</div><div class="group-name">${g.members.join(" & ")}</div></div>`;
  });
  html += `<div class="divider"></div>
  <span class="lbl">Documentos</span>
  <div class="card" style="display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:14px;color:var(--text);margin-bottom:3px">Estatutos de la colla</div><div style="font-size:11px;color:var(--faint)">Documento oficial · PDF</div></div>
    <button class="btn-ghost" onclick="alert('Añade aquí la URL del PDF de los estatutos cuando lo tengáis.')">Próximamente</button>
  </div>`;
  if(ME===TREASURER){
    html += `<div class="divider"></div>
    <span class="lbl" style="color:var(--neg)">Administración · solo tesorero</span>
    <div class="warn-card" style="background:#fbeae8;border-color:rgba(192,57,43,.3)">
      <div style="font-size:13px;color:var(--text);margin-bottom:4px;font-weight:500">Vaciar todos los datos</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5">Borra eventos, caja, lista de la compra, turnos y cuotas para toda la colla. Úsalo solo para empezar de cero. No se puede deshacer.</div>
      <button class="btn-accent" style="background:var(--neg);color:#fff;width:100%" onclick="resetAllData()">Vaciar y reiniciar la app</button>
    </div>`;
  }
  document.getElementById('body-colla').innerHTML = html;
}

// Reset total: borra todas las colecciones y sube la versión (obliga a todos
// los móviles a recargar la versión nueva → mata las apps zombi con seed viejo).
async function resetAllData(){
  if(!confirm("¿VACIAR TODOS LOS DATOS de la colla?\n\nSe borra todo (eventos, caja, compra, turnos, cuotas) para los 23 miembros y todas las apps se actualizarán.\n\nEsto NO se puede deshacer.")) return;
  if(!confirm("Última confirmación.\n\n¿Seguro que quieres vaciar la app por completo?")) return;
  showSync("Vaciando…");
  try{
    // 1) Borra todos los documentos de todas las colecciones
    for(const coll of COLLECTIONS){
      const snap = await DB.getDocs(DB.collection(DB.db, coll));
      for(const d of snap.docs){ await DB.deleteDoc(DB.doc(DB.db, coll, d.id)); }
    }
    // 2) Sube la versión mínima → toda app con versión < APP_VERSION+1 se recargará
    await DB.setDoc(DB.doc(DB.db,"meta","app"), { minVersion: APP_VERSION });
    showSync("Hecho · todo limpio");
    setTimeout(()=>{ alert("Datos vaciados. La app se recargará limpia en todos los móviles."); location.reload(true); }, 600);
  }catch(e){
    console.error(e);
    alert("Hubo un error al vaciar. Revisa la conexión e inténtalo de nuevo.");
  }
}

// ═══════════════════════════════ MODALS ══════════════════════════════
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeModalBg(e,id){ if(e.target===document.getElementById(id)) closeModal(id); }

function initEvTypePills(){
  evType = 'comida';
  document.getElementById('evTypePills').innerHTML = Object.entries(EVENT_TYPES).map(([key,val])=>
    `<span class="pill${key==='comida'?' on':''}" onclick="setEvType('${key}',this)">${val.label}</span>`
  ).join('');
  document.getElementById('evAgendaWrap').style.display='none';
}
function setEvType(type,el){
  evType=type;
  document.querySelectorAll('#evTypePills .pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('evAgendaWrap').style.display = type==='reunion'?'block':'none';
}
